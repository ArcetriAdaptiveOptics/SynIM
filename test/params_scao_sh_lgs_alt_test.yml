---

main:
  class:             'SimulParams'
  root_dir:          './calib/'
  pixel_pupil:       64
  pixel_pitch:       0.015625
  total_time:        0.010
  time_step:         0.001

seeing:
  class:             'WaveGenerator'
  constant:          0.6
  wave_type:         'SIN'
  outputs: ['output']

wind_speed:
  class:             'WaveGenerator'
  constant:          [5.]
  outputs: ['output']

wind_direction:
  class:             'WaveGenerator'
  constant:          [10.]
  outputs: ['output']

# off-axis star at 60 arcsec and 90 degrees (i.e. along the Y axis)
on_axis_source:
  class:             'Source'
  height:            20000                 # Source height [m]
  polar_coordinates: [60.0, 30.0]
  magnitude:         5
  wavelengthInNm:    600

pupilstop:
  class: 'Pupilstop'
  simul_params_ref:     'main'

atmo:
  class:                'AtmoEvolution'
  simul_params_ref:     'main'
  L0:                   25
  heights:              [0.]
  Cn2:                  [1.00]
  fov:                  140.0
  pixel_phasescreens:   2048
  inputs:
    seeing: 'seeing.output'
    wind_speed: 'wind_speed.output'
    wind_direction: 'wind_direction.output'
  outputs: ['layer_list']

prop:
  class:                'AtmoPropagation'
  simul_params_ref:     'main'
  source_dict_ref:      ['on_axis_source']
  inputs:
    atmo_layer_list: ['atmo.layer_list']
    common_layer_list: ['pupilstop',
                  'dm.out_layer:-1']
  outputs: ['out_on_axis_source_ef']

sh:
  class:             'SH'
  subap_wanted_fov:  4.0
  sensor_pxscale:    0.5
  subap_npx:         8
  subap_on_diameter: 8
  wavelengthInNm:    600
  rotAnglePhInDeg:   15                      # [deg] Rotation angle of the pyramid prism
  inputs:
    in_ef: 'prop.out_on_axis_source_ef'
  outputs:  ['out_i']

detector:
  class:             'CCD'  
  simul_params_ref:  'main'
  size:              [64,64]
  dt:                0.001
  bandw:             300
  photon_noise:      True
  readout_noise:     True
  readout_level:     1.0
  quantum_eff:       0.3
  inputs:
    in_i: 'sh.out_i'
  outputs:  ['out_pixels']

slopec:
  class:             'ShSlopec'
  subapdata_object:  'scao_subaps_n8_th0.5'
  weightedPixRad: 4.0
  inputs:
    in_pixels:        'detector.out_pixels'
  outputs:  ['out_slopes', 'out_subapdata']

rec:
  class:              'Modalrec'
  recmat_object:      'scao_rec_n8_th0.5'
  inputs:
    in_slopes:        'slopec.out_slopes'
  outputs:  ['out_modes', 'out_pseudo_ol_modes']

control:
  class:             'Integrator'
  simul_params_ref:  'main'
  delay:             2
  int_gain:          [0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,
                      0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,
                      0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,
                      0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5]  
  inputs:
      delta_comm: 'rec.out_modes'     
  outputs:  ['out_comm']

dm:
  class:             'DM'
  simul_params_ref:  'main'
  type_str:          'zernike'
  nmodes:            40
  height:            10000
  npixels:           512
  inputs:
      in_command: 'control.out_comm'
  outputs:  ['out_layer']

psf:
  class:             'PSF'
  simul_params_ref:  'main'
  wavelengthInNm:    1650                 
  nd:                8                    
  start_time:        0.0                  
  inputs:
      in_ef:  'prop.out_on_axis_source_ef'
  outputs:  ['out_psf', 'out_sr']

data_store:
  class:             'DataStore'
  store_dir:         './data'             
  inputs:    
    input_list: ['res_sr-psf.out_sr']